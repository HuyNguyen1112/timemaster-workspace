spring.application.name=timemaster
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://localhost:5432/timemaster
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.com.vinhhuy.timemaster=DEBUG

# MCP Server Tools Configuration
spring.ai.mcp.server.tools=mcpCreateTaskTool,mcpGetTasksTool,mcpCompleteTaskTool,mcpDeleteTaskTool,mcpUpdateTaskTool,mcpGetTasksByDateTool

# AI Sync Security
vector-store.internal-secret=timemaster-secret-2024

