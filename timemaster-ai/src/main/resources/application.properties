server.port=8081

# ==========================================
# LANGCHAIN4J - GEMINI AI CONFIGURATION
# ==========================================
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-2.5-flash
langchain4j.google-ai-gemini.chat-model.temperature=0.1

logging.level.dev.langchain4j=DEBUG

# ==========================================
# DATABASE & RAG PERSISTENCE
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/timemaster
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

vector-store.host=localhost
vector-store.port=5432
vector-store.database=timemaster

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
